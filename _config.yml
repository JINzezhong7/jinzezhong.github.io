# Zezhong Jin academic homepage configuration
# Replace YOUR_GITHUB_USERNAME with your actual GitHub username before publishing.

title                    : "Zezhong Jin"
description              : "Zezhong Jin is a Ph.D. student in Electrical and Electronic Engineering at The Hong Kong Polytechnic University. His research focuses on robust speaker representation learning, generative models, speech large language models, ASR, speech-to-speech translation, and speech emotion recognition."
repository               : "JINzezhong7/JINzezhong7.github.io"
google_scholar_stats_use_cdn : true

# Google Analytics and SEO verification are optional.
google_analytics_id      :
google_site_verification :
bing_site_verification   :
baidu_site_verification  :

author:
  name             : "Zezhong Jin"
  avatar           : "images/profile.png"
  bio              : "Ph.D. Student, The Hong Kong Polytechnic University"
  location         : "Hong Kong SAR"
  employer         : "The Hong Kong Polytechnic University"
  pubmed           :
  googlescholar    : "https://scholar.google.com/citations?hl=zh-CN&user=PvJY5hEAAAAJ"
  email            : "zezhong.jin@connect.polyu.hk"
  researchgate     :
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "JINzezhong7"
  google_plus      :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         :
  dblp             :
  orcid            :
  pinterest        :
  soundcloud       :
  stackoverflow    :
  steam            :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

include:
  - .htaccess
  - _pages
  - files

exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
